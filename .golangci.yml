version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - misspell
    - gocritic
    - whitespace
    - noctx
    - unparam
    - prealloc
    - errorlint
    - bodyclose
    - dupl
    - goconst
    - revive

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        - ifElseChain
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    misspell:
      locale: US

  exclusions:
    paths:
      - _test\.go
