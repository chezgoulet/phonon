# Phonon Coordinator Configuration
# Copy to phonon.yaml and adjust for your deployment.
#
# Quick start (no auth, no TLS):
#   cp phonon.example.yaml phonon.yaml
#   docker compose up -d
#
# Production (with TLS + OIDC):
#   See cluster.tls and cluster.auth sections below.

cluster:
  name: "chezgoulet"

  # ── Authentication ─────────────────────────────────────────
  auth:
    mode: "none"          # "none" for development, "oidc" for production
    # issuer: "https://authentik.chezgoulet.net/application/o/phonon/"
    # client_id: "phonon-coordinator"

  # ── TLS / HTTPS ────────────────────────────────────────────
  # Generate a self-signed cert for LAN use:
  #   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
  #     -keyout phonon.key -out phonon.crt \
  #     -subj "/CN=phonon.local"
  tls:
    enabled: false
    # cert_file: /app/phonon.crt
    # key_file:  /app/phonon.key

  # ── Networking ─────────────────────────────────────────────
  networking:
    prefer: "ethernet"    # "ethernet" or "wifi"

  # ── mDNS Discovery ─────────────────────────────────────────
  discovery:
    mdns:
      disabled: false     # set true for static IP deployments
      # port: 0           # 0 = auto

  # ── Health Monitoring ──────────────────────────────────────
  health:
    overheat:
      threshold: 45.0           # °C — removed from pool (default)
      reentry_threshold: 40.0   # °C — re-entered below (default)
    battery:
      low_threshold: 15         # % — removed when below AND not charging
      reentry_threshold: 30     # % — re-entered above this
      capacity_threshold: 80    # % — "charger-dependent" marked below
    draining_threshold: 50    # % — enter "draining" state when unplugged below this
    offline_timeout: "60s"      # phone removed after this long without heartbeat

  # ── Event Log (SQLite) ─────────────────────────────────────
  event_log:
    path: /app/data/phonon.db
    retention_days: 90

  # ── Queue Backpressure ─────────────────────────────────────
  queue:
    max_per_node: 3             # max concurrent requests per phone

  # Global token-bucket rate limit for the protected API routes.
  # Admin operations (pairing, preflight, model management, cluster) have
  # priority: when throttling kicks in, inference requests are shed first.
  # Sidecar routes are exempt.
  rate_limiting:
    enabled: false
    tokens_per_second: 10
    burst: 20

  # Model management endpoints.
  models:
    upload_max_bytes: 8589934592  # 8 GiB cap for POST /api/v1/models/upload

  # Port of the sidecar's on-phone inference server. Change only if the
  # sidecar is launched with a matching PHONON_INFERENCE_PORT override.
  inference_port: 9876

# ── Inference Groups ─────────────────────────────────────────
# Each group defines a model and the phones that serve it.
groups:
  # - name: "gemma-2b"
  #   mode: "pool"              # "pool" or "shard" (experimental — upstream runtime not yet shipped)
  #   model: "gemma-2b-it"
  #   runtime: "litert"         # "litert" (NPU/GPU) or "prima" (CPU-only)
  #   backend: "auto"           # auto (default) | npu | gpu | cpu
  #   phones: ["phone-kitchen", "phone-livingroom"]
  #   standby: ["phone-bedroom"]
  #   download_url: "http://coordinator:8080/api/v1/models/llama-3.2-1b-instruct-q4_k_m.gguf"
  #   checksum: "sha256:..."
