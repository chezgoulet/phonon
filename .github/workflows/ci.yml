name: CI

on:
  push:
    branches: [main, testing]
  pull_request:
    branches: [main, testing]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coordinator:
    name: Coordinator (Go)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.0"
          cache: true

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -race -count=1 -timeout=90s ./...

  sidecar:
    name: Sidecar (Android)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: sidecar
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --build-cache --no-daemon --console=plain

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: phonon-sidecar-debug
          path: sidecar/app/build/outputs/apk/debug/*.apk
          retention-days: 7
