name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  go:
    name: Go (coordinator)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
          working-directory: .

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Build (amd64)
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o /dev/null ./cmd/phonon-coordinator

      - name: Build (arm64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o /dev/null ./cmd/phonon-coordinator

  kotlin:
    name: Kotlin (sidecar)
    runs-on: ubuntu-latest
    if: false  # Sidecar codebase not yet present — enable in #14
    defaults:
      run:
        working-directory: sidecar
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Lint (ktlint)
        run: ./gradlew ktlintCheck

      - name: Static analysis (detekt)
        run: ./gradlew detekt

      - name: Test
        run: ./gradlew test

      - name: Build APK
        run: ./gradlew assembleDebug

  react:
    name: React (web UI)
    runs-on: ubuntu-latest
    if: false  # Web UI source not yet present — enable in #13
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Format check
        run: npx prettier --check src/

      - name: Lint
        run: npx eslint src/

      - name: Test
        run: npx vitest run

      - name: Build
        run: npm run build
