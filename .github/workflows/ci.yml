name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Web UI (React) ────────────────────────────────────────────────
  react:
    name: Web UI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install
        run: npm ci

      - name: Build (tsc + vite)
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/
          if-no-files-found: error

  # ─── Sidecar (Kotlin / Android) ───────────────────────────────────
  kotlin:
    name: Sidecar
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sidecar
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk/ndk
          key: ndk-${{ runner.os }}-27.0.12077973

      - name: Setup Android SDK
        run: |
          ANDROID_HOME="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          ANDROID_HOME="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"

          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            mkdir -p "$ANDROID_HOME/cmdline-tools"
            curl -sL "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" \
              -o /tmp/cmdline-tools.zip
            unzip -q /tmp/cmdline-tools.zip -d "$ANDROID_HOME/cmdline-tools"
            mv "$ANDROID_HOME/cmdline-tools/cmdline-tools" "$ANDROID_HOME/cmdline-tools/latest"
          fi

          # If NDK was restored from cache (4.2 GB!), skip the install.
          if [ -d "$ANDROID_HOME/ndk/27.0.12077973" ]; then
            echo "NDK cache hit – skipping NDK installation"
          else
            yes | "$SDKMANAGER" --install \
              "platforms;android-35" \
              "build-tools;35.0.0" \
              "ndk;27.0.12077973" > /dev/null 2>&1 || true
          fi

      - name: Set ANDROID_NDK
        run: echo "ANDROID_NDK=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Install Ninja
        run: sudo apt-get install -y -qq ninja-build

      - name: Test
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=512m"
        run: gradle test --max-workers 2

      - name: Cache libllama.so
        id: cache-llama
        uses: actions/cache@v4
        with:
          path: sidecar/app/src/main/jniLibs/arm64-v8a/libllama.so
          key: libllama-${{ hashFiles('extern/prima.cpp/**', 'sidecar/scripts/build-prima.sh', 'sidecar/app/build.gradle.kts') }}

      - name: Build APKs
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=512m"
        run: gradle assembleDebug assembleRelease --max-workers 2

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-apks
          path: |
            sidecar/app/build/outputs/apk/debug/*.apk
            sidecar/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

  # ─── Coordinator (Go) ─────────────────────────────────────────────
  go:
    name: Coordinator
    runs-on: ubuntu-latest
    needs: [react]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Download UI dist
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: cmd/phonon-coordinator/static/

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
          working-directory: .

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Build (linux/amd64)
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o phonon-coordinator-linux-amd64 ./cmd/phonon-coordinator

      - name: Build (linux/arm64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o phonon-coordinator-linux-arm64 ./cmd/phonon-coordinator

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: coordinator-binaries
          path: |
            phonon-coordinator-linux-amd64
            phonon-coordinator-linux-arm64
