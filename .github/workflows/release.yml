name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Web UI ──
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build UI
        run: |
          cd ui && npm ci && npm run build
          mkdir -p ../cmd/phonon-coordinator/static
          cp -r dist/* ../cmd/phonon-coordinator/static/

      # ── Go binaries ──
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Build (linux/amd64)
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o phonon-coordinator-linux-amd64 ./cmd/phonon-coordinator

      - name: Build (linux/arm64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o phonon-coordinator-linux-arm64 ./cmd/phonon-coordinator

      - name: Checksum
        run: |
          sha256sum phonon-coordinator-linux-amd64 > phonon-coordinator-linux-amd64.sha256
          sha256sum phonon-coordinator-linux-arm64 > phonon-coordinator-linux-arm64.sha256

      # ── GitHub Release ──
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            ## Phonon ${{ github.ref_name }}

            See [SPEC.md](SPEC.md) for system documentation and [CHANGELOG](CHANGELOG.md) for release notes.

            ### Binary Downloads

            - [phonon-coordinator-linux-amd64](phonon-coordinator-linux-amd64) — Linux x86_64
            - [phonon-coordinator-linux-arm64](phonon-coordinator-linux-arm64) — Linux ARM64 (Raspberry Pi, etc.)
          files: |
            phonon-coordinator-linux-amd64
            phonon-coordinator-linux-arm64
            phonon-coordinator-linux-amd64.sha256
            phonon-coordinator-linux-arm64.sha256
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
