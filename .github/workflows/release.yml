name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # ─── Web UI (React) ────────────────────────────────────────────────
  react:
    name: Web UI
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install
        run: npm ci

      - name: Build (tsc + vite)
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/
          if-no-files-found: error

  # ─── Sidecar (Kotlin / Android / LiteRT-LM) ───────────────────────
  kotlin:
    name: Sidecar
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: sidecar
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        run: |
          ANDROID_HOME="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          ANDROID_HOME="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"

          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            mkdir -p "$ANDROID_HOME/cmdline-tools"
            curl -sL "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" \
              -o /tmp/cmdline-tools.zip
            unzip -q /tmp/cmdline-tools.zip -d "$ANDROID_HOME/cmdline-tools"
            mv "$ANDROID_HOME/cmdline-tools/cmdline-tools" "$ANDROID_HOME/cmdline-tools/latest"
          fi

          yes | "$SDKMANAGER" --install \
            "platforms;android-35" \
            "build-tools;35.0.0" > /dev/null 2>&1 || true

      - name: Test
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=512m"
        run: gradle test --max-workers 2

      - name: Build APKs
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=512m"
        run: gradle assembleDebug assembleRelease --max-workers 2

      - name: Sign Release APK
        env:
          KEYSTORE_BASE64: ${{ secrets.PHONON_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.PHONON_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.PHONON_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.PHONON_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "❌ PHONON_KEYSTORE_BASE64 not set — cannot sign release APK"
            exit 1
          fi

          echo "🔐 Decoding keystore..."
          KEYSTORE_FILE="/tmp/release.keystore"
          echo "$KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_FILE"

          APK_DIR="$GITHUB_WORKSPACE/sidecar/app/build/outputs/apk/release"
          UNSIGNED_APK="$APK_DIR/app-release-unsigned.apk"
          SIGNED_APK="$APK_DIR/app-release.apk"

          if [ ! -f "$UNSIGNED_APK" ]; then
            echo "❌ Release APK not found at $UNSIGNED_APK"
            exit 1
          fi

          echo "📝 Signing with jarsigner..."
          jarsigner -verbose \
            -keystore "$KEYSTORE_FILE" \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            "$UNSIGNED_APK" "$KEY_ALIAS"

          echo "✅ Verifying signature..."
          jarsigner -verify -verbose "$UNSIGNED_APK"

          echo "📦 Aligning with zipalign..."
          ANDROID_HOME="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          ANDROID_HOME="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          ZIPALIGN="$ANDROID_HOME/build-tools/35.0.0/zipalign"
          "$ZIPALIGN" -f -v 4 "$UNSIGNED_APK" "$SIGNED_APK"

          rm "$UNSIGNED_APK"
          echo "✅ Release APK signed and aligned: $SIGNED_APK"

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-apks
          path: |
            sidecar/app/build/outputs/apk/debug/*.apk
            sidecar/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

  # ─── Coordinator (Go) ─────────────────────────────────────────────
  go:
    name: Coordinator
    runs-on: ubuntu-22.04
    needs: [react]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Download UI dist
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: cmd/phonon-coordinator/static/

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
          working-directory: .

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Build (linux/amd64)
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o phonon-coordinator-linux-amd64 ./cmd/phonon-coordinator

      - name: Build (linux/arm64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o phonon-coordinator-linux-arm64 ./cmd/phonon-coordinator

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: coordinator-binaries
          path: |
            phonon-coordinator-linux-amd64
            phonon-coordinator-linux-arm64
          if-no-files-found: error

  # ─── Release (depends on all build jobs) ───────────────────────────
  release:
    name: Publish Release
    needs: [react, kotlin, go]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: |
            sidecar-apks
            coordinator-binaries
          merge-multiple: false

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Phonon ${{ github.ref_name }}
          body: |
            ## Phonon ${{ github.ref_name }}

            Automated release from tag ${{ github.ref_name }}.

            ### Artifacts

            - **Phone APK** (`sidecar-apks/app-release.apk`) — signed Android APK for the sidecar
            - **Debug APK** (`sidecar-apks/app-debug.apk`) — unsigned debug APK
            - **Coordinator (amd64)** — Linux x86_64 binary
            - **Coordinator (arm64)** — Linux ARM64 binary

            ### Docker Image

            - `chezgoulet/phonon-coordinator:${{ github.ref_name }}`
              (multi-arch: linux/amd64 + linux/arm64 — also available on Docker Hub)
          draft: true
          prerelease: false
          files: |
            sidecar-apks/app-release.apk
            sidecar-apks/app-debug.apk
            coordinator-binaries/phonon-coordinator-linux-amd64
            coordinator-binaries/phonon-coordinator-linux-arm64
          fail_on_unmatched_files: false
